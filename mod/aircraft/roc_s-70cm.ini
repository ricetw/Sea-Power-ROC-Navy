[General]
# ROCN S-70C(M) local dependency prototype.
# Visual model and animation identifiers are based on Workshop item 3737267013 SH-60B resources.
# Do not redistribute third-party model/texture assets without permission.
UnitType=Helicopter

DefaultCameraDistance=1
MinCameraDistanceForeAft=0.33
MinCameraDistanceBroadside=0.33
CameraPivotHeight=0.0

GroundedPitchAngle=0.3  // this angle is the pitch (x) angle at ground with gears down
GroundPivot=0,-0.024672,0
GroundTaxiInterval=0.25
OnDeckPositionOffset=0,0,0

ForwardsTaxiVelocity=10
BackwardsTaxiVelocity=0

[OpticalView]
Views=binocular_7x50,binocular_10x50
DefaultView=binocular_7x50

[AI]
Role=ASW,MPA,SAR

[---------- Physics and Control ----------]
[Physics]
############################################################
# Physics definition
############################################################
MaxPitchRate=15.0                  // in degrees per second
MaxRollRate=30.0                   // in degrees per second
MaxYawRate=60.0                    // in degrees per second
MaxPitchAngle=15
MaxRollAngleHovering=30
MaxRollAngleForwardFlight=60
TargetPitchForForwardFlight=0   // angle in degrees the helicopter stays in when moving forward when releasing controls

// hovering movements
HoverStrength=0.5                  // determines how strong the hover movements are
MinVelocityForNoHoverMovement=40   // in knots, above this value there won't be additional hover movements
MaxHoverRadius=5                   // radius in meter the heli is allowed to do hover movements

MaxSpeedAtSeaLevel=146             // in knots
MaxBackwardSpeed=20                // in knots
MaxSidewardSpeed=30                // in knots
Ceiling=19000                    // ceiling in feet
Altitudes=20,200,500,1000,3000,5000,10000,15000  // in feet
ClimbRate=34.8                    // feet per second

EmptyMass=6190                     // in kg
MaxFuel=1830                       // in kg
MaxRange=412                       // in n miles
HoveringFuelConsumption=0.50       // Minimum fuel consumption when hovering.

MainThrustAccelerationFactor=5   // determines the engine thrust acceleration factor (as multiplicator of v=a*t)
LinearDrag=0.9995                  // this is for velocity damping (linear drag)
CurveDragFactor=2.0                // determines how quickly the helicopter loses velocity (dependend on steepness of curve)
GravityDragFactor=1.0              // determines the gravity factor (1.0 means here standard 9.81m/s²)

MousePitchFactor=0.3
MouseYawFactor=0.3

EngineWarmUpTime=10
RotorsSpinUpTime=40

[SensorData]
#Visual
VisualIdentificationRange=10       // Biggest range in nm at which this unit can be visually identified
IRSignature=Small
# Radar related (RCS => radar cross section)
RCS=Small
# Sonar related

