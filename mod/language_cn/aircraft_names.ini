Type=反潛直升機
Default=S-70C(M),S-70C(M)
DefaultDescription=S-70C(M) 是美國海軍由 UH-2 通用直升機發展而來的艦載反潛直升機。它設計用於反潛與反水面作戰，1970 年被選為輕型空中多用途系統（LAMPS）直升機，並在幾乎所有配備機庫的美國海軍護航艦艇上服役。
