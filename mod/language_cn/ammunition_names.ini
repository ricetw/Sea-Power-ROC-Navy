[AmmunitionNames]
rocn_rim-66k-2=RIM-66K-2,SM-2MR Block IIIA,面對空/反水面,中華民國海軍基隆級使用的標準二型中程防空飛彈 Block IIIA。本模組項目沿用遊戲原版 RIM-66G 外觀，並以較佳低空目標攔截、終端近炸引信與電子反反制能力作為遊戲化近似。
rocn_rgm-84l=RGM-84L,魚叉 Block II,反艦/對地飛彈,中華民國海軍基隆級使用的 RGM-84L 魚叉 Block II 艦射反艦飛彈。本模組項目沿用遊戲原版 RGM-84D 外觀，並以 GPS/INS 航路精度、固定岸上目標攻擊能力與較佳電子反反制能力作為遊戲化近似。
rocn_hf-3=雄風三型,HF-3,超音速反艦飛彈,中華民國國造雄風三型超音速反艦飛彈。此模組項目為獨立彈藥，不覆蓋 RGM-84L 魚叉；遊戲數據以公開標準型數據 150 公里射程、Mach 2.5 級速度與約 1.4 噸彈體作為基準，並使用自製高面數 HF-3 外觀模型。
rocn_hf-2=雄風二型,HF-2,次音速反艦飛彈,中華民國國造雄風二型次音速反艦飛彈，具掠海飛行、固態加力器、渦輪噴射巡航與複式終端尋標能力。遊戲暫以主動雷達導引及較高反干擾能力近似 RF／IIR 複式尋標器，外觀暫用原版魚叉模型，後續將替換為自製雄二模型。
