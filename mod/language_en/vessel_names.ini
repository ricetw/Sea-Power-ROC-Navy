[roc_ddg_kee_lung]
Type=DDG,Destroyer
Default=Kee Lung-class (Kidd),Kee Lung
DefaultDescription=The Kee Lung class are the four former US Navy Kidd-class guided-missile destroyers transferred to the Republic of China Navy in the mid-2000s. They retain the Kidd class hull, two Mk 26 missile launchers, SPS-48/SPS-49 family air-search fit, SPG-51 missile fire-control radars, SQS-53 sonar, Mk 45 guns, Mk 141 Harpoon launchers, Mk 32 torpedo tubes, Phalanx CIWS, and SRBOC launchers.
Variant1=DDG-1801 Kee Lung,Kee Lung
Variant2=DDG-1802 Su Ao,Su Ao
Variant3=DDG-1803 Tso Ying,Tso Ying
Variant4=DDG-1805 Ma Kong,Ma Kong

[roc_ffg_cheng_kung]
Type=FFG,Frigate
Default=Cheng Kung-class (Modified Perry),Cheng Kung
DefaultDescription=The Cheng Kung class are Republic of China-built modified long-hull Oliver Hazard Perry-class frigates. This mod uses the vanilla long-hull Perry as its base and equips the class with a Mk 13 launcher and 40 SM-1MR missiles, eight HF-2 missiles or a later mixed HF-2/HF-3 battery, one 76 mm gun, two 40 mm guns, Mk 32 torpedo tubes, Phalanx CIWS, and two S-70C(M) ASW helicopters.
Variant1=PFG-1101 Cheng Kung,Cheng Kung
Variant2=PFG-1103 Cheng Ho,Cheng Ho
Variant3=PFG-1105 Chi Kuang,Chi Kuang
Variant4=PFG-1106 Yueh Fei,Yueh Fei
Variant5=PFG-1107 Tzu I,Tzu I
Variant6=PFG-1108 Pan Chao,Pan Chao
Variant7=PFG-1109 Chang Chien,Chang Chien

[roc_ffg_tien_tan]
Type=FFG,Frigate
Default=ROCS Tien Tan (Eighth Cheng Kung),Tien Tan
DefaultDescription=ROCS Tien Tan is the eighth ROC-built Cheng Kung-class frigate. Originally intended as an advanced combat-system prototype, she was ultimately completed to the Cheng Kung pattern but without the two amidships 40 mm guns fitted to the first seven ships. The remaining first-version fit follows the Cheng Kung long hull, Mk 13, indigenous anti-ship missiles, 76 mm gun, Mk 32 tubes, Phalanx, and S-70C(M) configuration.
Variant1=PFG-1110 Tien Tan,Tien Tan
