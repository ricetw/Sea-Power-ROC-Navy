[AmmunitionNames]
rocn_rim-66k-2=RIM-66K-2,SM-2MR Block IIIA,SAM/ASuW,Republic of China Navy SM-2MR Block IIIA missile for Kee Lung-class destroyers. This mod entry uses the vanilla RIM-66G visual assets while modeling the later Block IIIA guidance/fuzing improvements as a gameplay approximation.
rocn_rgm-84l=RGM-84L,Harpoon Block II,ASM/Land Attack,Republic of China Navy RGM-84L Harpoon Block II surface-launched missile for Kee Lung-class destroyers. This mod entry uses the vanilla RGM-84D visual assets while modeling Block II GPS/INS route accuracy, fixed coastal target attack, and improved ECCM as a gameplay approximation.
