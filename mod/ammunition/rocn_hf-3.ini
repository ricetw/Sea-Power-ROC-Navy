[General]
# ROCN Hsiung Feng III / HF-3 supersonic anti-ship missile.
# Independent missile entry: does not reuse or overwrite RGM-84/Harpoon data.
# Public standard-model basis used for gameplay: 6.1 m length, 0.46 m diameter,
# approx. 1.4 t mass, Mach 2.5 class speed, 150 km / 81 nmi range.
Type=Missile
TargetType=ASuW

CIWSDefenceBonus=10                    // Supersonic sea-skimming target; lower than SS-N-22 but above subsonic Harpoon
MissileDefenceBonus=0.10

Mass=1400                              // kg, public standard HF-3 class figure
AmmoPoints=5200                        // Gameplay cost: advanced supersonic ASM, below heavier SS-N-22
SupplyCategory=ROCN_HF3

DefaultCameraDistance=0.75
MinCameraDistanceForeAft=0.34
MinCameraDistanceBroadside=0.38
CameraPivotHeight=0.0

SaturationValue=2
DecalClass=Standard

[SensorData]
#Visual
VisualIdentificationRange=4
IRSignature=SemiSmall
# Radar related (RCS => radar cross section)
RCS=0.35
# Transient
TransientRCS=Medium
TransientVisualIdentificationRange=20
TransientBaseNoise=240

[---------- Warhead Data ----------]
[WarheadData]
WarheadType=0
Power=45                                // Game-scale value close to Harpoon-class warhead; kinetic effect represented by speed/defence bonuses
ImpactSize=Large
Penetration=Always

[---------- Guidance ----------]
[Guidance]
GuidanceType=3                          // Active radar homing
MidCourseCorrection=0
InitialFlightPhaseDuration=3.0
Retargetable=False
PerformsSlightBallisticInitialFlight=True
#======================================== Flight Profile ===========================================================
# High-energy ramjet anti-ship profile. Values are gameplay approximations around official public speed/range data.
MaxLoftAngle=45.0
MaxLoftAlt=30000.0
MaxLoftVelocity=1650.0
SeaSkimmingAlt=65
SeaSkimmingMaxDescentAngle=22.0
SeaSkimmingNoseUp=2.0
SeaSkimmingStartDistToTarget=55
FinalFlightPhaseAlt=32
FinalFlightPhaseMaxAngle=15.0
FinalFlightPhaseDistToTarget=22.0
TerminalApproachDist=10.0
TerminalAlt=32
SupportsBanking=False
#========================================= Launch stats ============================================================
MaxVelocity=1650.0                      // Mach 2.5 class, converted to knots for Sea Power
Acceleration=14.0
MaxTurnRate=10.0
MinLaunchRange=5.0
MaxLaunchRange=81.0                     // 150 km standard public range converted to nautical miles
LaunchReliability=95
#========================================     Seeker     ===========================================================
#Homing
SeekerGain=45.0
SeekerFOV=55,10
SeekerActiveRange=20.0
SeekerPassiveRange=0
Frequency=X-Band
PeakPower=38
#Misc Guidance Properties
SizeGate=10
RangeGate=2
#ECCM
AntiCountermeasuresBonus=0.3
AntiJammerBonus=0.15
#SelfDestruct
SelfDestructDelay=5.0

