[General]
# ROCN SM-2MR Block IIIA (RIM-66K-2)
# Uses vanilla RIM-66G visual assets. Gameplay data is tuned from public Block IIIA notes: improved low-altitude TDD, heavier MK 125 warhead, and better ECCM.
Type=Missile                           // can be Projectile, Missile, Torpedo
TargetType=AAW                         // can be AAW, ASuW, ASW
SecondaryTargetType=ASuW
LandAttackCapability=ShoreTargetsOnly  // can be  All, Installation, Mobile, ShoreTargetsOnly

Mass=707                               // in kg. Used for aircraft
AmmoPoints=1900                        // For Supply System. Defines "price" of ammunition based on mass, volume, complexity and availability

DefaultCameraDistance=0.6
MinCameraDistanceForeAft=0.29
MinCameraDistanceBroadside=0.29
CameraPivotHeight=0.0

DecalClass=SAMImpacts  // referenced in effects/decals.ini

[SensorData]
#Visual
VisualIdentificationRange=4  // at what range in nm this unit can be visually identified
IRSignature=Small
# Radar related (RCS => radar cross section)
RCS=VerySmall
# Sonar related
# Transient
TransientRCS=Small                    // Transient visibility on the radar
TransientVisualIdentificationRange=5  // Transient can be visually detected at this distance in nmi
TransientBaseNoise=200                // In db

[---------- Warhead Data ----------]
#Warhead Types:
#0 = Blast Fragmentation
#1 = Armor Piercing
#2 = HEAT
#3 = Illumination
#4 = Cluster
#5 = Runway Cratering

# Fuze Types: 0 = Impact Fuze, 1 = Proximity Fuze
[WarheadData]
WarheadType=0
Power=26
ImpactSize=SemiSmall                    // Impact size, can be small, medium, large, verylarge
Penetration=Always                      // can be minor, moderate, heavy, always

FuzeProximityDistance=15.0              // for proximity fuze: distance to target in meters. Also indicates that Fuze Type = Proximity Fuze
KillProbability=0.88                     // Base chance to hit
InterceptSpeedPenaltyMultiplier=0.75                  // multiplier to the severity of the speed penalty, 0.75 for good, 1.0 for average, 1.25 for poor
InterceptOutOfAltitudePenalty=0.28                  // base value used for out-of-altitude calculations, 0.20 is excellent, 0.30 is good, 0.40 is average, 0.50 is poor
InterceptSizePenaltyMultiplier=0.70					// multiplier to the size penalty, 1.0 is default
[---------- Guidance ----------]
# Guidance Types:
# 0 = None
# 1 = IR Homing
# 2 = Semi-Active Radar Homing
# 3 = Active Radar Homing
# 4 = Anti-Radiation Homing
# 5 = Laser-Homing
# 6 = TV-Homing
# 7 = Active Sonar Homing
# 8 = Passive Sonar Homing
# 9 = Wake Homing
[Guidance]
GuidanceType=2
MidCourseCorrection=3                  // 0 = None, 1 = Radio Command, 2 = Wire Guided, 3 = Datalink midcourse (used with SARH or ARH)
InitialFlightPhaseDuration=3.0         // time in seconds where the missile moves straight on without guiding
Retargetable=False
#======================================== Flight Profile ===========================================================
#flight phase 1: loft-----------------------------------------------------------------------------------------------------------------
#1st stage of missile flight - high altitude
MaxLoftAngle=30.0                      // Climb angle for initial loft
MaxLoftAlt=70000.0                     // in feet. Maximum altitude for lofting
#flight phase 2: sea skimming---------------------------------------------------------------------------------------------------------
#2nd stage of missile flight - low altitude
#flight phase 3: final flight phase (e.g. terminal popup)------------------------------------------------------------------------------
#Pop-Up. Missile climbs to higher altitude before activating the seeker. Or in some cases going even lower
#flight phase 4: terminal approach------------------------------------------------------------------------------------------------------
#Last stage - missile activates seeker and locks on target
TerminalApproachDist=5              // in N. miles. Recommended to set this distance slightly less than the seeker range. For SAM better set it to max value, 1000 miles is enough
#=========================================  Kinematics  ============================================================
ApplyKinematics=True                   // If we should use full kinematics rules. If this is true, we will only use kinematics 
#for acceleration, instead of calculating acceleration time based on the max velocity. MaxVelocity is still used, since missile stalls at 1/4 max velocity or 500 knots, whichever is less
MaxVelocity=2800.0                     // Maximum speed in knots
MaxTurnRate=30.0                       // Maximum turnrate in degrees per second
MaxTurnG=25                       // Maximum G-limit of missile turns
AccelerationTime=4                  // Burn time for initial booster burn
Acceleration=17.3                      // Gs of acceleration in initial burn
SustainerAccelerationTime=40            // Time of sustainer burn. -1 if there is no sustainer burn
SustainerAcceleration=1.95               // Acceleration of sustainer burn. -1 if there is no sustainer
#AEROJET Mk.104 Dual-Thrust Rocket Motor
#120kN - 4s Boost
#13kN - 40s Sustain
TypicalTargetAlt=15000					// Sets the estimated target altitude (in feet) at which the missile will reach maximum firing range. Use 0 if the target is a surface unit. Default: 50000
TypicalFiringAlt=0				// Sets the estimated firing altitude (in feet) at which the missile will reach maximum firing range. Use 0 for a surface launch missile. Default: 50000
TypicalLaunchVelocity=0				// Sets the estimated firing speed (in knots) at which the missile will reach maximum firing range. Use 0 for a surface launch missile. Default: 1000
DragCoefficient=-1               // Drag coefficient. 0 for no drag, 1 for default drag, more for more drag. Defaults to -1, where we calculate it based on missile max range
VelocityBleed=0.8                      // Missile will eventually slowdown to MaxVelocity*VelocityBleed at the end of its lifetime
MaxFlightTime=185               // How long until missile entirely fails, acts as a hard limit based on batteries, etc. Default: unlimited
TerminalLoft=True
TimeLimited=True
LiftFactor=0.0025				// default is 0.005, defines the extra drag at high altitudes/low speeds due to the increase AOA from lift loss, lower values improve lift characteristics and are less impacted by altitude
#========================================= Launch stats ============================================================
MinLaunchRange=2.5                    // Minimum launch range in nautical miles
MaxLaunchRange=90.0                    // Maximum launch range in nautical miles
MinAttackAltitude=25                   // Minimum altitude of a target, in feet. Outside Min/Max altitude missile deviation is greatly increaced
MaxAttackAltitude=120000                // Maximum altitude of target, in feet
MaxAttackVelocity=2800				   // Maximum velocity of target, in knots. Above this velocity, hit chance is degraded proportional to the target velocity above this speed
LaunchReliability=97                   // The lower the value, the greater risk of misfire or accident (0...100)
#========================================     Seeker     ===========================================================
#Homing
SeekerGain=0.0                         // Seeker gain in dB
SeekerFOV=60.0                         // Seeker field-of-view in degrees
SeekerActiveRange=0.0                  // Seeker active range in nautical miles. Relevant for  Active Radar Homing, Laser-Homing and Active Sonar Homing (3, 5 and 7)
SeekerPassiveRange=110                   // Seeker passive range in nautical miles. Relevant for IR Homing, Semi-Active Radar Homing, Anti-Radiation Homing, TV-Homing, Passive Sonar Homing and Passive Sonar Homing (1, 2, 4, 6, 8 and 9)
SecondaryPassiveRadarGuidanceType=HomeOnJam  //Used with Active or SemiActive radar seeker. Used to detect emitting targets and home on them prior getting active target lock. Supported values: Full for both radar and ECM emissions and HomeOnJam if can home on jammers only
PassiveRadarGuidanceFrequencies=All    // Frequences Anti-Radiation, HomeOnJam and secondary Passive Radar Guidance weapons can detect
#Misc Guidance Properties
#InsDrift=0.5							   // In degrees per minute of unguided flight. Shifts the weapon's nose by this amount per minute whenever the missile is not being actively guided (RC, Wire, tracking a target with its seeker)
# cass: meant for making missiles drift when they lose their target, blocked for now due to unresolved issues
#ECCM
AntiCountermeasuresBonus=0.40          // This value substracted from probability of spoofing by countermeasures (0...1)
AntiJammerBonus=0.35                   // This value substracted from probability of being jammed  (0...1)
#Search params for torpedoes
#SelfDestruct
SelfDestructDelay=2.0                  // delay in seconds for self destruction

[---------- Mesh definitions----------]
[Models]
ResourcesFolder=weapons/usn_rim_collection/
ResourcesRoot=usn_rim_collection
ResourcesMesh=usn_rim-66g
ResourcesMaterial=usn_rim-66g_mat
############################################################
[---------- Launchers ----------]
# References to the launchers are just used for positioning relative to the launcher of the missile
[Launchers]
NumberOfLaunchers=3
Launcher1=MK13
Launcher2=MK22
Launcher3=MK26

[MK13]
LoadedPosition=0,0,0.003
UnloadedPosition=0,0,-0.086
LoadedRotation=0,0,0
UnloadedRotation=0,0,0

[MK22]
LoadedPosition=0,0,-0.002
UnloadedPosition=0,0,-0.086
LoadedRotation=0,0,0
UnloadedRotation=0,0,0

[MK26]
LoadedPosition=0,0,-0.003
UnloadedPosition=0,0,-0.086
LoadedRotation=0,0,0
UnloadedRotation=0,0,0
[---------- Effects ----------]
# Effects are referenced in /effects/effects.ini when using an effects class
# e.g. either:
# BoosterEffect=effects/weapons/emitters/submarine_torpedo_launch
# or
# BoosterEffectClass=BoosterEffects  // this will be referenced in effects.ini

# possible values (optionally with suffix "Class")
# BoosterEffect, InFligheEffect, UnderwaterTrail, ParachuteEffect, TorpedoSurfaceSplash, HitWaterSplash
# DebrisTrail, DebrisSplash, SmallFireEffect, ModerateFireEffect, SevereFireEffect,
# HitAirExplosion, HitShipExplosion, HitObjectExplosion, HitGroundExplosion, HitDefaultExplosion
[Particles]
BoosterEffect=effects/weapons/emitters/sam_medium_effect
BoosterEffectPosition=0,0,-0.031
InFlightEffectClass=DefaultMissileInflightEffect
InFlightEffectPosition=0,0,-0.025
InFlightEffectStartTime=3.0  // in seconds, after that the Inflight Effect will be played if available

SustainerEffect=effects/weapons/emitters/missile_sustainer_small_effect
SustainerEffectPosition=0,0,-0.015 
SustainerEffectStartTime=3.0

HitDefaultExplosionClass=MediumMissileExplosions
HitShipExplosionClass=MediumShipHitExplosion
HitAirExplosionClass=MediumMissileExplosions

HitWaterSplashClass=SmallWaterSplashes
HitGroundExplosionClass=RocketGroundHitExplosion

[---------- Colliders ----------]
[Colliders]
# creates the hit box for this object
Collider=col_main

[col_main]
Collider=Box
Position=0,0,0.012
Rotation=0,0,0
Scale=0.005,0.005,0.07