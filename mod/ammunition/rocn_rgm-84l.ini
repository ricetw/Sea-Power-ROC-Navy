[General]
# ROCN RGM-84L Harpoon Block II
# Uses the RGM-84D visual assets. Gameplay data is tuned for Block II GPS/INS
# route accuracy, fixed coastal target attack, and improved ECCM.
Type=Missile                           // can be Projectile, Missile, Torpedo
TargetType=ASuW                        // can be AAW, ASuW, ASW
LandAttackCapability=Installation      // can be  All, Installation, Mobile, ShoreTargetsOnly

Mass=690                               // in kg. Used for aircraft
AmmoPoints=1850                        // For Supply System. Defines "price" of ammunition based on mass, volume, complexity and availability
SupplyCategory=Harpoon                 // For Supply System. Makes that presence of such category is required for replenishment of this weapon

DefaultCameraDistance=0.6
MinCameraDistanceForeAft=0.29
MinCameraDistanceBroadside=0.29
CameraPivotHeight=0.0

DecalClass=Standard                    // referenced in effects/decals.ini

[SensorData]
#Visual
VisualIdentificationRange=2  // at what range in nm this unit can be visually identified
IRSignature=Small
# Radar related (RCS => radar cross section)
RCS=0.15
# Sonar related
# Transient
TransientRCS=Meager                    // Transient visibility on the radar
TransientVisualIdentificationRange=15  // Transient can be visually detected at this distance in nmi
TransientBaseNoise=220                 // In db

[---------- Warhead Data ----------]
#Warhead Types:
#0 = Blast Fragmentation
#1 = Armor Piercing
#2 = HEAT
#3 = Illumination
#4 = Cluster
#5 = Runway Cratering

# Fuze Types:
# 0 = Impact Fuze
# 1 = Proximity Fuze
[WarheadData]
WarheadType=0
Power=45
ImpactSize=Medium                      // Impact size, can be small, medium, large, verylarge
Penetration=Always                     // can be minor, moderate, heavy, always

[---------- Guidance ----------]
# Guidance Types:
# 0 = None
# 1 = IR Homing
# 2 = Semi-Active Radar Homing
# 3 = Active Radar Homing
# 4 = Anti-Radiation Homing
# 5 = Laser-Homing
# 6 = TV-Homing
# 7 = Active Sonar Homing
# 8 = Passive Sonar Homing
# 9 = Wake Homing
[Guidance]
GuidanceType=3
MidCourseCorrection=0                  // 0 = None, 1 = Radio Command, 2 = Wire Guided
InitialFlightPhaseDuration=3.0         // time in seconds where the missile moves straight on without guiding
Retargetable=False
PerformsSlightBallisticInitialFlight=True  // flag if the missile performs a slight ballistic flight curve during the initial phase (e.g. vessel launched harpoon)
#======================================== Flight Profile ===========================================================
#flight phase 1: loft -----------------------------------------------------------------------------------------------------------------
#1st stage of missile flight - high altitude
MaxLoftAngle=50.0                      // Climb angle for initial loft
MaxLoftAlt=3000.0                      // in feet. Maximum altitude for lofting
#flight phase 2: sea skimming ---------------------------------------------------------------------------------------------------------
#2nd stage of missile flight - low altitude
SeaSkimmingAlt=50                      // height in feet for sea skimming
SeaSkimmingMaxDescentAngle=45.0        // Dive angle whlie going to sea skimming
SeaSkimmingNoseUp=2.0                  // "nose up" angle in degrees for sea skimming, reflecting the aerodynamics
SeaSkimmingStartDistToTarget=1000      // in N. miles.
#flight phase 3: final flight phase (e.g. terminal popup)------------------------------------------------------------------------------
#Pop-Up. Missile climbs to higher altitude before activating the seeker. Or in some cases going even lower
#flight phase 4: terminal approach------------------------------------------------------------------------------------------------------
#Last stage - missile activates seeker and locks on target
TerminalApproachDist=8.0               // in N. miles. Recommended to set this distance slightly less than the seeker range. For SAM must be slightly more than max range
TerminalAlt=7                         // in feet. Weapon will try to get to this altitude at the start of terminal approach
TerminalPopUpDist=1                    // Pop-up distance in miles
TerminalPopUpHeight=1000               // Pop-up height in feet
TerminalPopUpAngle=70                  // Pop-up climb anble in degrees
SelectivePopUp=True                    // If true - pop up works only against submarines and small boats
TerminalVerticalTurnRate=25            // Override of vertical turn rate in terminal (intended for Pop-up)
SupportsBanking=False                  // if the missile will bank when turning
#========================================= Launch stats ============================================================
MaxVelocity=540.0                      // Maximum speed in knots
Acceleration=6.0                       // Acceleration factor
MaxTurnRate=15.0                       // Maximum turnrate in degrees per second
MinLaunchRange=3.5                     // Minimum launch range in nautical miles
MaxLaunchRange=67.0                    // Maximum launch range in nautical miles
LaunchReliability=97                   // The lower the value, the greater risk of misfire or accident (0...100)
#========================================     Seeker     ===========================================================
CircularErrorRadiusInstallation=35     // Circular error vs 'Installation' land units
#Homing
SeekerGain=55.0                        // Seeker gain in dB
SeekerFOV=45,10                        // Seeker active range in nautical miles. Relevant for  Active Radar Homing, Laser-Homing and Active Sonar Homing (3, 5 and 7)
SeekerActiveRange=20.0                 // Seeker active range in nautical miles. Relevant for Semi-Active Radar Homing, Active Radar Homing, Laser-Homing and Active Sonar Homing (2, 3, 5 and 7)
SeekerPassiveRange=20.0                // Seeker passive range in nautical miles. Relevant for IR Homing, Semi-Active Radar Homing, Anti-Radiation Homing, TV-Homing, Passive Sonar Homing and Passive Sonar Homing (1, 2, 4, 6, 8 and 9)
SecondaryPassiveRadarGuidanceType=HomeOnJam  //Used with Active or SemiActive radar seeker. Used to detect emitting targets and home on them prior getting active target lock. Supported values: Full for both radar and ECM emissions and HomeOnJam if can home on jammers only
PassiveRadarGuidanceFrequencies=All    // Frequences Anti-Radiation, HomeOnJam and secondary Passive Radar Guidance weapons can detect
Frequency=Ku-Band                      // Active radar seeker frequency, used to determine the jamming efficiency, jammer should support the same band
PeakPower=35.0                         // Active radar seeker output peak power in kW
#Misc Guidance Properties
RangeGate=1							   // 
SizeGate=8						   //
#ECCM
AntiCountermeasuresBonus=0.4           // This value substracted from probability of spoofing by countermeasures (0...1)
AntiJammerBonus=0.3                    // This value substracted from probability of being jammed  (0...1)
#Search params for torpedoes
#SelfDestruct
SelfDestructDelay=5.0                  // delay in seconds for self destruction

[---------- Mesh definitions----------]
[Models]
ResourcesFolder=weapons/usn_rgm-84/
ResourcesRoot=usn_rgm-84
ResourcesMesh=usn_rgm_84
ResourcesMaterial=usn_rgm-84d_mat
ResourcesMeshForLaunch=usn_rgm_84_dummy
ResourcesMeshSwitchTime=0.2            // time in seconds after launch to switch from launch mesh to main mesh

[Debris]
DebrisProbability=100                  // probability for debris to happen
ResourcesMeshForDebris=usn_rgm_84_d    // optional debris mesh after destruction
DebrisPosition=0.05                    // moves it in front of the warhead to have the trailing effect at correct position
DebrisLifeTime=10.0
DebrisVelocityDampening=0.99
DebrisHeightLossAdd=0.0005             // determines how quickly the debris loses height

[---------- Launchers ----------]
# References to the launchers are just used for positioning relative to the launcher of the missile
[Launchers]
NumberOfLaunchers=3
Launcher1=MK11
Launcher2=MK13
Launcher3=MK22

[MK11]
LoadedPosition=0,0,0.006
UnloadedPosition=0,0,-0.067
LoadedRotation=0,0,0
UnloadedRotation=0,0,0

[MK13]
LoadedPosition=0,0,0.006
UnloadedPosition=0,0,-0.067
LoadedRotation=0,0,0
UnloadedRotation=0,0,0
OnRailWarmup=12                       // Additional time missile spends on rail warming up

[MK22]
LoadedPosition=0,0,0.006
UnloadedPosition=0,0,-0.067
LoadedRotation=0,0,0
UnloadedRotation=0,0,0
OnRailWarmup=12                       // Additional time missile spends on rail warming up

[---------- Effects ----------]
# Effects are referenced in /effects/effects.ini when using an effects class
# e.g. either:
# BoosterEffect=effects/weapons/emitters/submarine_torpedo_launch
# or
# BoosterEffectClass=BoosterEffects  // this will be referenced in effects.ini

# possible values (optionally with suffix "Class")
# BoosterEffect, InFligheEffect, UnderwaterTrail, ParachuteEffect, TorpedoSurfaceSplash, HitWaterSplash
# DebrisTrail, DebrisSplash, SmallFireEffect, ModerateFireEffect, SevereFireEffect,
# HitAirExplosion, HitShipExplosion, HitObjectExplosion, HitGroundExplosion, HitDefaultExplosion
[Particles]
BoosterEffect=effects/weapons/emitters/usn_rgm_84_booster
BoosterEffectPosition=0,0,0

InFlightEffect=effects/weapons/emitters/turbojet_sustainer_small
InFlightEffectPosition=0,0,-0.022
InFlightEffectStartTime=3.0  // in seconds, after that the Inflight Effect will be played if available

UnderwaterTrail=effects/weapons/emitters/aswtorpedo_cavitation_particle
UnderwaterTrailPosition=0,0,-0.022

HitShipExplosionClass=MediumShipHitExplosion
HitAirExplosionClass=MediumMissileExplosions
HitWaterSplashClass=LargeWaterSplashes
HitDefaultExplosionClass=MediumMissileExplosions
DebrisTrailClass=MissileDebrisFire
DebrisSplashClass=SmallWaterSplashes

[---------- Colliders ----------]
[Colliders]
# creates the hit box for this object
Collider=coll_main

[coll_main]
Collider=Box
Position=0,0,0
Rotation=0,0,0
Scale=0.005,0.005,0.066
